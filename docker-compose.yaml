services:
    gateway:
      build:
        context: . #在当前目录找dockerfile，以及项目文件
        args:
          SERVICE: gateway
      command: ["./app", "api"]
      ports:
        - "9000:9000"
      volumes:
        - ./config/config.docker.yaml:/app/config/config.yaml
      depends_on:
        pgsql:
          condition: service_healthy
        minio:
          condition: service_started
        auth:
          condition: service_started
        user:
          condition: service_started
        post:
          condition: service_started


    auth:
      build:
        context: .
        args:
          SERVICE: service/auth
      command: ["./app", "rpc"]
      volumes:
        - ./config/config.docker.yaml:/app/config/config.yaml
      depends_on:
        pgsql:
          condition: service_healthy


    post:
      build:
        context: .
        args:
          SERVICE: service/post
      command: ["./app", "rpc"]
      volumes:
        - ./config/config.docker.yaml:/app/config/config.yaml
      depends_on:
        pgsql:
          condition: service_healthy


    user:
      build:
        context: .
        args:
          SERVICE: service/user
      command: ["./app", "rpc"]
      volumes:
        - ./config/config.docker.yaml:/app/config/config.yaml
      depends_on:
        pgsql:
          condition: service_healthy


    pgsql:
      image: postgres:18.1
      environment:
        POSTGRES_USER: admin
        POSTGRES_PASSWORD: "123456"
        POSTGRES_DB: auth
      ports:
        - "5432:5432"
      volumes:
        - pg_data:/var/lib/postgresql
        - ./initial.sql:/docker-entrypoint-initdb.d/initial.sql
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U admin -d auth" ]
        interval: 3s
        timeout: 3s
        retries: 10

    minio:
      image: minio/minio
      command: server /data --address ":10000" --console-address ":10001"
      ports:
        - "10000:10000"   # S3 API
        - "10001:10001"   # 管理后台
      environment:
        MINIO_ROOT_USER: admin
        MINIO_ROOT_PASSWORD: admin123456
      volumes:
        - minio_data:/data

volumes:
  pg_data:
  minio_data: