syntax = "proto3";

import "google/protobuf/empty.proto";

package grpc.proto.auth;

option go_package = "auth/pb/auth_pb";

message RegisterReq {
  string account = 1;
  string password = 2;
  string re_password = 3;
}

message LoginReq {
  string account = 1;
  string password = 2;
}

message LoginResp {
  string access_token = 1;
  string refresh_token = 2;
}

message RefreshReq {
  string refresh_token = 1;
}

message RefreshResp {
  string access_token = 1;
}

service AuthService{
  rpc Register(RegisterReq) returns (google.protobuf.Empty);
  rpc Login(LoginReq) returns (LoginResp);
  rpc Refresh(RefreshReq)returns (RefreshResp);
}