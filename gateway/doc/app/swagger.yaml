basePath: /api/v1
definitions:
  auth.LoginRequest:
    properties:
      account:
        maxLength: 20
        minLength: 6
        type: string
      password:
        maxLength: 20
        minLength: 6
        type: string
    required:
    - account
    - password
    type: object
  auth.RegisterRequest:
    properties:
      account:
        maxLength: 20
        minLength: 6
        type: string
      password:
        maxLength: 20
        minLength: 6
        type: string
    required:
    - account
    - password
    type: object
  post.CreateReq:
    properties:
      content:
        maxLength: 1000
        minLength: 1
        type: string
      post_type:
        enum:
        - 0
        - 1
        - 2
        - 3
        type: integer
      title:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - content
    - post_type
    - title
    type: object
  post.DetailReq:
    properties:
      postId:
        type: integer
    required:
    - postId
    type: object
  post.ListReq:
    properties:
      page:
        maximum: 200
        minimum: 1
        type: integer
      pageSize:
        maximum: 150
        minimum: 5
        type: integer
      postType:
        enum:
        - 0
        - 1
        - 2
        - 3
        type: integer
      sort:
        enum:
        - 0
        - 1
        - 2
        type: integer
    required:
    - page
    - pageSize
    type: object
  user.BatchGetUserInfoReq:
    properties:
      uids:
        items:
          type: integer
        type: array
    required:
    - uids
    type: object
  user.UpdateUserReq:
    properties:
      avatar:
        type: string
      nickname:
        maxLength: 16
        minLength: 1
        type: string
      uid:
        type: integer
    required:
    - uid
    type: object
host: localhost:9999
info:
  contact: {}
  description: 后端接口文档
  title: s1ark api
  version: "1.0"
paths:
  /api/v1/account/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 注册请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses: {}
      tags:
      - account
  /api/v1/account/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Bearer token
        in: header
        name: Cookie
        required: true
        type: string
      produces:
      - application/json
      responses: {}
      tags:
      - account
  /api/v1/account/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: 注册请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses: {}
      tags:
      - account
  /api/v1/post/create:
    post:
      consumes:
      - application/json
      parameters:
      - description: 创建请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/post.CreateReq'
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      tags:
      - post
  /api/v1/post/detail:
    post:
      consumes:
      - application/json
      parameters:
      - description: 详情请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/post.DetailReq'
      produces:
      - application/json
      responses: {}
      tags:
      - post
  /api/v1/post/list:
    post:
      consumes:
      - application/json
      parameters:
      - description: 列表请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/post.ListReq'
      produces:
      - application/json
      responses: {}
      tags:
      - post
  /api/v1/user/batch:
    post:
      consumes:
      - application/json
      parameters:
      - description: 批量获取用户信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.BatchGetUserInfoReq'
      produces:
      - application/json
      responses: {}
      tags:
      - user
  /api/v1/user/update:
    post:
      consumes:
      - application/json
      parameters:
      - description: 修改用户信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.UpdateUserReq'
      produces:
      - application/json
      responses: {}
      tags:
      - user
securityDefinitions:
  BearerAuth:
    description: 请输入 Bearer access_token
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
